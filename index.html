  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>

  <!-- PWA & Theme Bootstrapping Scripts -->
  <script>
    (() => {
      // Immediately apply dark class to prevent screen flashing before React mounts
      try {
        if (
          localStorage.getItem('theme') === 'dark' ||
          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
        console.error('Theme initialization failed:', e);
      }

      // Automatically reload page on ChunkLoadError (e.g. from deleted chunk hashes after server build updates)
      window.addEventListener('error', (e) => {
        if (e.message && (e.message.indexOf('ChunkLoadError') !== -1 || e.message.indexOf('Loading chunk') !== -1)) {
          console.warn('Chunk load error detected. Reloading page to fetch the latest production assets...');
          window.location.reload();
        }
      }, true);
    })();
  </script>
</head>

<body>
  <div id="root"><!--ssr-outlet--></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
